name: Crypto Price Ingestion

on:
  schedule:
    - cron: '0 9 * * *' # Runs at 09:00 UTC every day
  workflow_dispatch:      # Allows you to run it manually for testing!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Extraction
        run: python extract_script.py
        env:
          # This is where you'll eventually put Snowflake credentials!
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}